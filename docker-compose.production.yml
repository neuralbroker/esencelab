services:
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: /api
        BACKEND_PROXY_TARGET: http://backend:3001
        AI_PROXY_TARGET: http://ai-service:3002
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - backend
      - ai-service
    ports:
      - "3000:3000"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET}
      AI_SERVICE_URL: http://ai-service:3002
      FRONTEND_URLS: ${FRONTEND_URLS:-http://localhost:3000}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      DATA_PROVIDER: ${DATA_PROVIDER:-memory}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
    depends_on:
      - ai-service
    ports:
      - "3001:3001"
    restart: unless-stopped

  ai-service:
    build:
      context: ./ai-service
    environment:
      AI_ALLOWED_ORIGINS: ${AI_ALLOWED_ORIGINS:-http://localhost:3000,http://frontend:3000}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      STUDENT_ASSISTANT_CACHE_TTL_SEC: ${STUDENT_ASSISTANT_CACHE_TTL_SEC:-300}
    ports:
      - "3002:3002"
    restart: unless-stopped
