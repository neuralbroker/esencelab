name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  schema:
    name: Schema contract
    runs-on: ubuntu-latest
    env:
      STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify Supabase schema file contract
        run: node scripts/verify-supabase-schema.js
      - name: Install PostgreSQL client for optional staging check
        if: env.STAGING_DATABASE_URL != ''
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Verify staging database has recruiter request migration
        if: env.STAGING_DATABASE_URL != ''
        run: |
          psql "$STAGING_DATABASE_URL" -v ON_ERROR_STOP=1 -tAc "select count(*) from information_schema.tables where table_name = 'recruiter_access_requests';" | grep -qx 1
          psql "$STAGING_DATABASE_URL" -v ON_ERROR_STOP=1 -tAc "select count(*) from information_schema.columns where table_name = 'recruiter_access_requests' and column_name in ('status','reviewed_by','reviewed_at','user_id');" | grep -qx 4

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run test:all
      - run: npm audit --audit-level=moderate

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm audit --audit-level=moderate

  ai-service:
    name: AI service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            ai-service/requirements.txt
            ai-service/requirements-dev.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m pip check
      - run: python -m compileall app tests
      - run: python tests/smoke_test.py
      - run: python -m pip_audit -r requirements.txt
